services:
  - type: web
    name: service-pilot-api
    runtime: python
    plan: free                                      # Explicitly use free tier
    region: oregon                                  # Render free tier region
    buildCommand: pip install -r requirements.txt
    startCommand: python api.py
    healthCheckPath: /api/health                    # Render uses this to confirm service is alive
    envVars:
      - key: GROQ_API_KEY
        sync: false                                 # Set manually in Render dashboard
    disk:
      name: vectorstore
      mountPath: /opt/render/project/src/vectorstore
      sizeGB: 1